spring:
  application:
    name: zdmj
  
  # PostgreSQL 数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver
    # 时区配置：确保Java的LocalDateTime与PostgreSQL的TIMESTAMP WITH TIME ZONE正确转换
    # Asia/Shanghai: 中国时区（UTC+8）
    # 当数据库使用TIMESTAMP WITH TIME ZONE时，PostgreSQL会自动转换为连接时区
    url: jdbc:postgresql://111.229.81.45:5432/zdmj?currentSchema=public&stringtype=unspecified&TimeZone=Asia/Shanghai
    username: zdmj
    password: zdmj
  
  # Redis 配置
  data:
    redis:
      host: 111.229.81.45
      port: 6379
      password: zdmj
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          
    # MongoDB 配置
    mongodb:
      host: 111.229.81.45
      port: 27017
      username: zdmj
      password: zdmj
      authentication-database: admin
      database: zdmj
  
  # 邮件配置（163邮箱）
  mail:
    host: smtp.163.com  # 163邮箱SMTP服务器
    port: 465  # SSL端口，也可以使用587（TLS）
    username: zdmj123456@163.com  # 发送邮件的163邮箱
    password: XCtkmZ9FMRPVcNCi  # 163邮箱授权码（不是登录密码，需要在邮箱设置中开启SMTP服务获取）
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true  # 启用SSL（使用465端口时需要）
            required: true
          starttls:
            enable: false  # 使用SSL时，starttls设为false
            required: false

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath:mapper/**/*.xml
  # 实体类包路径（用于类型别名）
  type-aliases-package: com.zdmj
  # 全局配置
  global-config:
    # 数据库配置
    db-config:
      # 主键类型：AUTO（数据库自增）
      id-type: auto
      # 表名下划线命名
      table-underline: true
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（已删除）
      logic-delete-value: 1
      # 逻辑未删除值（未删除）
      logic-not-delete-value: 0
  # MyBatis 原生配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # SQL 日志输出（开发环境使用，生产环境建议关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


# 服务器配置
server:
  port: 8080

# JVM时区配置（通过环境变量或启动参数设置）
# 建议在启动时添加：-Duser.timezone=Asia/Shanghai
# 或者在Dockerfile中设置：ENV TZ=Asia/Shanghai

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info