spring:
  application:
    name: zdmj
  
  # PostgreSQL 数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver
    # 时区配置：确保Java的LocalDateTime与PostgreSQL的TIMESTAMP WITH TIME ZONE正确转换
    # Asia/Shanghai: 中国时区（UTC+8）
    # 当数据库使用TIMESTAMP WITH TIME ZONE时，PostgreSQL会自动转换为连接时区
    url: jdbc:postgresql://localhost:5432/zdmj?currentSchema=public&stringtype=unspecified&TimeZone=Asia/Shanghai
    username: your-db-username
    password: your-db-password
  
  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: your-redis-password  # 如果Redis没有密码，可以留空或删除此行
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  # 邮件配置（163邮箱）
  mail:
    host: smtp.163.com  # 163邮箱SMTP服务器
    port: 465  # SSL端口，也可以使用587（TLS）
    username: your-email@163.com  # 发送邮件的163邮箱
    password: your-email-auth-code  # 163邮箱授权码（不是登录密码，需要在邮箱设置中开启SMTP服务获取）
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true  # 启用SSL（使用465端口时需要）
            required: true
          starttls:
            enable: false  # 使用SSL时，starttls设为false
            required: false

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath:mapper/**/*.xml
  # 实体类包路径（用于类型别名）
  type-aliases-package: com.zdmj
  # 全局配置
  global-config:
    # 数据库配置
    db-config:
      # 主键类型：AUTO（数据库自增）
      id-type: auto
      # 表名下划线命名
      table-underline: true
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（已删除）
      logic-delete-value: 1
      # 逻辑未删除值（未删除）
      logic-not-delete-value: 0
  # MyBatis 原生配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # SQL 日志输出（开发环境使用，生产环境建议关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


# 服务器配置
server:
  port: 8080

# API 统一前缀配置
api:
  prefix: /api/zdmj

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info

# 腾讯云COS配置
# 注意：生产环境建议使用环境变量配置敏感信息，避免将密钥直接写在配置文件中
# 环境变量优先级高于配置文件中的值
cos:
  # 腾讯云SecretId（访问密钥ID）
  # 获取方式：腾讯云控制台 -> 访问管理 -> API密钥管理
  # 生产环境建议使用环境变量：export COS_SECRET_ID=your-secret-id
  secret-id: ${COS_SECRET_ID:your-secret-id}
  
  # 腾讯云SecretKey（访问密钥）
  # 获取方式：腾讯云控制台 -> 访问管理 -> API密钥管理
  # 生产环境建议使用环境变量：export COS_SECRET_KEY=your-secret-key
  secret-key: ${COS_SECRET_KEY:your-secret-key}
  
  # 地域（Region）
  # 可选值：ap-beijing（北京）、ap-shanghai（上海）、ap-guangzhou（广州）、ap-chengdu（成都）等
  # 必须与存储桶实际创建的地域一致
  # 生产环境建议使用环境变量：export COS_REGION=ap-shanghai
  region: ${COS_REGION:ap-shanghai}
  
  # 存储桶名称（Bucket Name）
  # 格式：bucketname-appid（如：mybucket-1234567890）
  # 注意：必须包含APPID后缀，否则会报InvalidRequest错误
  # 获取方式：腾讯云控制台 -> 对象存储 -> 存储桶列表 -> 查看存储桶名称
  # 生产环境建议使用环境变量：export COS_BUCKET_NAME=your-bucket-name-appid
  bucket-name: ${COS_BUCKET_NAME:your-bucket-name-appid}
  
  # 预签名URL过期时间（秒），默认1小时（3600秒）
  presigned-url-expiration: 3600
