spring:
  application:
    name: zdmj
  
  # PostgreSQL 数据库配置
  datasource:
    driver-class-name: org.postgresql.Driver
    # 时区配置：确保Java的LocalDateTime与PostgreSQL的TIMESTAMP WITH TIME ZONE正确转换
    # Asia/Shanghai: 中国时区（UTC+8）
    # 当数据库使用TIMESTAMP WITH TIME ZONE时，PostgreSQL会自动转换为连接时区
    url: jdbc:postgresql://${app.remote.host}:5432/zdmj?currentSchema=public&stringtype=unspecified&TimeZone=Asia/Shanghai
    username: your-postgres-user
    password: your-postgres-password
  
  # Redis 配置
  data:
    redis:
      host: ${app.remote.host}
      port: 6379
      password: your-redis-password
      timeout: 10000ms  # 增加到10秒，避免超时
      lettuce:
        pool:
          max-active: 16  # 增加连接池大小
          max-idle: 8
          min-idle: 2  # 保持最小连接数
        shutdown-timeout: 200ms
  
  # 邮件配置（163邮箱）
  mail:
    host: smtp.163.com  # 163邮箱SMTP服务器
    port: 465  # SSL端口，也可以使用587（TLS）
    username: your-mail-username
    password: your-mail-password
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true  # 启用SSL（使用465端口时需要）
            required: true
          starttls:
            enable: false  # 使用SSL时，starttls设为false
            required: false
   
  # 模型配置
  ai:
    dashscope:
      base-url: https://dashscope.aliyuncs.com
      api-key: your-dashscope-api-key
      chat:
        options:
          model: qwen-plus
      # Embedding模型配置
      embedding:
        options:
          model: text-embedding-v4
      # 禁用自动重试机制，让异常立即返回
      retry:
        max-attempts: 1
        on-client-errors: false
      # PostgreSQL Vector Store配置
      vectorstore:
        pgvector:
          index-type: HNSW
          distance-type: COSINE_DISTANCE
          dimensions: 1024  # text-embedding-v4 实际生成的向量维度
          initialize-schema: true
          remove-existing-vector-store-table: false

# MyBatis-Plus 配置
mybatis-plus:
  # Mapper XML 文件位置
  mapper-locations: classpath:mapper/**/*.xml
  # 实体类包路径（用于类型别名）
  type-aliases-package: com.zdmj
  # 全局配置
  global-config:
    # 数据库配置
    db-config:
      # 主键类型：AUTO（数据库自增）
      id-type: auto
      # 表名下划线命名
      table-underline: true
      # 逻辑删除字段名
      logic-delete-field: deleted
      # 逻辑删除值（已删除）
      logic-delete-value: 1
      # 逻辑未删除值（未删除）
      logic-not-delete-value: 0
  # MyBatis 原生配置
  configuration:
    # 开启驼峰命名转换
    map-underscore-to-camel-case: true
    # SQL 日志输出（开发环境使用，生产环境建议关闭）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl


# 服务器配置
server:
  port: 8080

# API 统一前缀配置
api:
  prefix: /api/zdmj

# Actuator 配置
management:
  endpoints:
    web:
      exposure:
        include: health,info

# 日志配置
logging:
  level:
    org.springframework.ai.chat.client.advisor: DEBUG
    com.zdmj: DEBUG

# 腾讯云COS配置
# 注意：生产环境建议使用环境变量配置敏感信息，避免将密钥直接写在配置文件中
# 环境变量优先级高于配置文件中的值
cos:
  # 腾讯云SecretId（访问密钥ID）
  secret-id: your-cos-secret-id
  secret-key: your-cos-secret-key
  # 地域（Region）
  # 生产环境建议使用环境变量：export COS_REGION=ap-shanghai
  region: your-cos-region
  
  # 存储桶名称（Bucket Name）
  bucket-name: your-cos-bucket-name
  
  # 预签名URL过期时间（秒），默认1小时（3600秒）
  presigned-url-expiration: 3600

app:
  remote:
    host: your-server-ip

