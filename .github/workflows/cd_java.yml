# CD工作流：后端自动化部署
# 当代码合并到main分支时自动构建Docker镜像并部署到服务器
#
# 前置要求：
# 1. 在GitHub仓库的Settings > Secrets and variables > Actions中配置SSH_PRIVATE_KEY
# 2. SSH密钥格式要求：
#    - 包含完整的私钥内容（包括 -----BEGIN OPENSSH PRIVATE KEY----- 和 -----END OPENSSH PRIVATE KEY-----）
#    - 或者包含 -----BEGIN RSA PRIVATE KEY----- 和 -----END RSA PRIVATE KEY-----
#    - 确保密钥有访问服务器的权限（公钥已添加到服务器的 ~/.ssh/authorized_keys）
# 3. 生成SSH密钥对（如果还没有）：
#    ssh-keygen -t rsa -b 4096 -C "github-actions"
#    然后将私钥添加到GitHub Secrets，公钥添加到服务器
#
name: CD - Deploy Backend

# 触发条件配置
on:
  # 当代码推送到main分支时触发（通常是合并PR后）
  push:
    branches:
      - main
  # 允许在GitHub Actions页面手动触发此工作流
  workflow_dispatch:

# 全局环境变量配置
env:
  REGISTRY: docker.io              # Docker镜像仓库（当前未使用，本地构建）
  IMAGE_NAME: zdmj-backend         # Docker镜像名称
  SERVER_HOST: 111.229.81.45       # 部署服务器IP地址
  SERVER_USER: root                # 服务器SSH登录用户名

jobs:
  # 构建和部署任务
  build-and-deploy:
    name: Build and Deploy
    # 使用GitHub提供的Ubuntu最新版本作为运行环境
    runs-on: ubuntu-latest
    
    steps:
      # 步骤1: 检出代码
      # 将仓库代码下载到GitHub Actions运行器中，供后续步骤使用
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2: 设置Java开发环境
      # 安装JDK 21，使用Eclipse Temurin发行版
      # 配置Maven缓存以加速构建过程
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'          # Java版本
          distribution: 'temurin'     # JDK发行版
          cache: maven                # 启用Maven依赖缓存

      # 步骤3: 构建Spring Boot应用
      # 编译Java代码并打包成可执行的JAR文件
      # -DskipTests: 跳过测试（因为CI阶段已经运行过测试）
      - name: Build application
        working-directory: ./backend/zdmj  # 指定工作目录
        run: mvn clean package -DskipTests

      # 步骤4: 设置Docker Buildx
      # Buildx是Docker的扩展构建工具，支持高级构建特性
      # 包括多平台构建、构建缓存等
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤5: 构建Docker镜像
      # 使用Dockerfile构建Docker镜像
      # 直接使用latest标签，简化流程
      # 使用GitHub Actions缓存机制加速构建（如果Dockerfile或依赖未变化）
      - name: Build Docker image
        uses: docker/build-push-action@v5
        id: build
        with:
          context: ./backend/zdmj              # Docker构建上下文目录
          file: ./backend/zdmj/Dockerfile      # Dockerfile文件路径
          push: false                          # 不推送到远程仓库，仅本地构建
          load: true                           # 将镜像加载到本地Docker环境（重要！）
          tags: ${{ env.IMAGE_NAME }}:latest    # 直接使用latest标签
          cache-from: type=gha                 # 从GitHub Actions缓存读取
          cache-to: type=gha,mode=max          # 将构建缓存保存到GitHub Actions

      # 步骤6: 验证镜像构建成功
      # 检查镜像是否成功构建
      - name: Verify image build
        run: |
          echo "Checking if image was built successfully..."
          # 列出所有镜像
          docker images
          # 检查目标镜像是否存在
          if docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "^${{ env.IMAGE_NAME }}:latest$"; then
            echo "✓ Image ${{ env.IMAGE_NAME }}:latest found successfully"
            docker images | grep ${{ env.IMAGE_NAME }}
          else
            echo "✗ Error: Image ${{ env.IMAGE_NAME }}:latest not found"
            echo "All available images:"
            docker images
            exit 1
          fi

      # 步骤7: 保存Docker镜像为tar文件
      # 将构建好的Docker镜像导出为tar压缩文件
      # 方便后续通过SCP传输到服务器
      - name: Save Docker image
        run: |
          echo "Saving Docker image to tar file..."
          # 直接使用latest标签保存镜像
          docker save ${{ env.IMAGE_NAME }}:latest -o image.tar
          # 验证tar文件是否创建成功
          if [ -f image.tar ]; then
            echo "✓ Image saved successfully"
            ls -lh image.tar
          else
            echo "✗ Error: Failed to save image"
            exit 1
          fi

      # 步骤8: 将镜像文件复制到服务器
      # 使用SCP协议将镜像tar文件传输到目标服务器
      # 需要配置SSH_PRIVATE_KEY密钥（在GitHub Secrets中设置）
      - name: Copy image to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.SERVER_HOST }}         # 服务器IP地址
          username: ${{ env.SERVER_USER }}     # SSH用户名
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # SSH私钥（从GitHub Secrets读取）
          port: 22                             # SSH端口
          timeout: 60s                         # 连接超时时间
          source: "image.tar"                  # 本地文件路径
          target: "/tmp/"                      # 服务器目标目录
          strip_components: 0                  # 不剥离路径组件

      # 步骤9: 部署到服务器
      # 通过SSH连接到服务器，执行部署脚本
      # 包括：加载镜像、停止旧容器、启动新容器、清理临时文件
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SERVER_HOST }}         # 服务器IP地址
          username: ${{ env.SERVER_USER }}     # SSH用户名
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # SSH私钥
          port: 22                             # SSH端口
          timeout: 60s                         # 连接超时时间
          script: |
            # 加载Docker镜像到本地Docker环境
            docker load -i /tmp/image.tar
            
            # 停止并删除旧容器（如果存在）
            # || true 确保即使容器不存在也不会报错
            docker stop zdmj-backend || true
            docker rm zdmj-backend || true
            
            # 运行新容器
            # -d: 后台运行
            # --name: 容器名称
            # --restart unless-stopped: 自动重启策略（除非手动停止）
            # -p 8080:8080: 端口映射（主机8080映射到容器8080）
            # -e TZ=Asia/Shanghai: 设置时区
            # -v /opt/zdmj:/opt/zdmj: 挂载数据卷（如果需要持久化数据）
            # 容器工作目录已设置为 /opt/zdmj
            docker run -d \
              --name zdmj-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -e TZ=Asia/Shanghai \
              ${{ env.IMAGE_NAME }}:latest
            
            # 清理临时文件，释放磁盘空间
            rm -f /tmp/image.tar
            
            # 清理未使用的Docker镜像，释放磁盘空间
            docker image prune -f

      # 步骤10: 验证部署
      # 检查容器是否正常运行，并查看最近的日志
      # 确认部署是否成功
      - name: Verify deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SERVER_HOST }}         # 服务器IP地址
          username: ${{ env.SERVER_USER }}     # SSH用户名
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # SSH私钥
          port: 22                             # SSH端口
          timeout: 60s                         # 连接超时时间
          script: |
            # 等待10秒，让容器完全启动
            sleep 10
            # 检查容器是否在运行列表中
            docker ps | grep zdmj-backend
            # 查看容器最近50行日志，确认启动状态
            docker logs --tail 50 zdmj-backend
