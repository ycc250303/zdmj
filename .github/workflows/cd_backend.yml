# CD工作流：后端自动化部署
# 当代码合并到main分支时自动构建Docker镜像并部署到服务器
name: CD - Deploy Backend

# 触发条件配置
on:
  # 当代码推送到main分支时触发（通常是合并PR后）
  push:
    branches:
      - main
  # 允许在GitHub Actions页面手动触发此工作流
  workflow_dispatch:

# 全局环境变量配置
env:
  REGISTRY: docker.io              # Docker镜像仓库（当前未使用，本地构建）
  IMAGE_NAME: zdmj-backend         # Docker镜像名称
  SERVER_HOST: 111.229.81.45       # 部署服务器IP地址
  SERVER_USER: root                # 服务器SSH登录用户名

jobs:
  # 构建和部署任务
  build-and-deploy:
    name: Build and Deploy
    # 使用GitHub提供的Ubuntu最新版本作为运行环境
    runs-on: ubuntu-latest
    
    steps:
      # 步骤1: 检出代码
      # 将仓库代码下载到GitHub Actions运行器中，供后续步骤使用
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤2: 设置Java开发环境
      # 安装JDK 21，使用Eclipse Temurin发行版
      # 配置Maven缓存以加速构建过程
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'          # Java版本
          distribution: 'temurin'     # JDK发行版
          cache: maven                # 启用Maven依赖缓存

      # 步骤3: 构建Spring Boot应用
      # 编译Java代码并打包成可执行的JAR文件
      # -DskipTests: 跳过测试（因为CI阶段已经运行过测试）
      - name: Build application
        working-directory: ./backend/zdmj  # 指定工作目录
        run: mvn clean package -DskipTests

      # 步骤4: 设置Docker Buildx
      # Buildx是Docker的扩展构建工具，支持高级构建特性
      # 包括多平台构建、构建缓存等
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 步骤5: 提取镜像元数据
      # 自动生成Docker镜像的标签（tag）和标签（label）
      # 根据分支名、提交SHA等信息生成有意义的镜像标签
      - name: Extract metadata
        id: meta  # 设置步骤ID，后续步骤可以通过steps.meta引用
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}  # 镜像名称
          tags: |
            type=raw,value=latest,priority=1  # 始终使用latest标签（优先级最高）
            type=ref,event=branch                    # 使用分支名作为标签
            type=sha,prefix={{branch}}-              # 使用分支名-提交SHA作为标签

      # 步骤6: 构建Docker镜像
      # 使用Dockerfile构建Docker镜像
      # 使用GitHub Actions缓存机制加速构建（如果Dockerfile或依赖未变化）
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/zdmj              # Docker构建上下文目录
          file: ./backend/zdmj/Dockerfile      # Dockerfile文件路径
          push: false                          # 不推送到远程仓库，仅本地构建
          tags: ${{ steps.meta.outputs.tags }}  # 使用元数据步骤生成的标签
          labels: ${{ steps.meta.outputs.labels }}  # 使用元数据步骤生成的标签
          cache-from: type=gha                 # 从GitHub Actions缓存读取
          cache-to: type=gha,mode=max          # 将构建缓存保存到GitHub Actions

      # 步骤7: 保存Docker镜像为tar文件
      # 将构建好的Docker镜像导出为tar压缩文件
      # 方便后续通过SCP传输到服务器
      - name: Save Docker image
        run: |
          # 列出所有镜像，确认构建的镜像标签
          echo "Available images:"
          docker images | grep ${{ env.IMAGE_NAME }} || true
          # 尝试使用latest标签，如果不存在则使用第一个找到的标签
          if docker images --format "{{.Repository}}:{{.Tag}}" | grep -q "^${{ env.IMAGE_NAME }}:latest$"; then
            IMAGE_TAG="${{ env.IMAGE_NAME }}:latest"
          else
            # 获取第一个可用的标签
            IMAGE_TAG=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep "^${{ env.IMAGE_NAME }}:" | head -n1)
            if [ -z "$IMAGE_TAG" ]; then
              echo "Error: No image found with name ${{ env.IMAGE_NAME }}"
              docker images
              exit 1
            fi
          fi
          echo "Using image tag: $IMAGE_TAG"
          # 使用获取到的标签保存镜像
          docker save $IMAGE_TAG -o image.tar
          # 验证tar文件是否创建成功
          ls -lh image.tar

      # 步骤8: 将镜像文件复制到服务器
      # 使用SCP协议将镜像tar文件传输到目标服务器
      # 需要配置SSH_PRIVATE_KEY密钥（在GitHub Secrets中设置）
      - name: Copy image to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.SERVER_HOST }}         # 服务器IP地址
          username: ${{ env.SERVER_USER }}     # SSH用户名
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # SSH私钥（从GitHub Secrets读取）
          port: 22                             # SSH端口
          source: "image.tar"                  # 本地文件路径
          target: "/tmp/"                      # 服务器目标目录

      # 步骤9: 部署到服务器
      # 通过SSH连接到服务器，执行部署脚本
      # 包括：加载镜像、停止旧容器、启动新容器、清理临时文件
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SERVER_HOST }}         # 服务器IP地址
          username: ${{ env.SERVER_USER }}     # SSH用户名
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # SSH私钥
          port: 22                             # SSH端口
          script: |
            # 加载Docker镜像到本地Docker环境
            docker load -i /tmp/image.tar
            
            # 停止并删除旧容器（如果存在）
            # || true 确保即使容器不存在也不会报错
            docker stop zdmj-backend || true
            docker rm zdmj-backend || true
            
            # 运行新容器
            # -d: 后台运行
            # --name: 容器名称
            # --restart unless-stopped: 自动重启策略（除非手动停止）
            # -p 8080:8080: 端口映射（主机8080映射到容器8080）
            # -e TZ=Asia/Shanghai: 设置时区
            # -v /opt/zdmj:/opt/zdmj: 挂载数据卷（如果需要持久化数据）
            # 容器工作目录已设置为 /opt/zdmj
            docker run -d \
              --name zdmj-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -e TZ=Asia/Shanghai \
              ${{ env.IMAGE_NAME }}:latest
            
            # 清理临时文件，释放磁盘空间
            rm -f /tmp/image.tar
            
            # 清理未使用的Docker镜像，释放磁盘空间
            docker image prune -f

      # 步骤10: 验证部署
      # 检查容器是否正常运行，并查看最近的日志
      # 确认部署是否成功
      - name: Verify deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SERVER_HOST }}         # 服务器IP地址
          username: ${{ env.SERVER_USER }}     # SSH用户名
          key: ${{ secrets.SSH_PRIVATE_KEY }}  # SSH私钥
          port: 22                             # SSH端口
          script: |
            # 等待10秒，让容器完全启动
            sleep 10
            # 检查容器是否在运行列表中
            docker ps | grep zdmj-backend
            # 查看容器最近50行日志，确认启动状态
            docker logs --tail 50 zdmj-backend
